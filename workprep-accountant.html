<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>WorkPrep — Rapportering</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0f172a;
  --bg2:    #1e293b;
  --bg3:    #273449;
  --border: #334155;
  --accent: #3b82f6;
  --a2:     #2563eb;
  --green:  #22c55e;
  --text:   #f1f5f9;
  --t2:     #94a3b8;
  --t3:     #475569;
  --fh:     'Syne', sans-serif;
  --fm:     'JetBrains Mono', monospace;
}

html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--fh); }

/* TOPBAR */
#topbar {
  height: 52px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
}
.logo { font-size: 16px; font-weight: 800; letter-spacing: 2px; }
.logo span { color: var(--accent); }
.logo-sub { font-size: 10px; font-family: var(--fm); color: var(--t3); letter-spacing: 1px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.user-chip { display: flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; }
.user-sub { font-size: 10px; color: var(--t3); font-family: var(--fm); }

/* MAIN */
#main { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

/* TOOLBAR */
.toolbar {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 20px;
}
.toolbar-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--t3); margin-bottom: 14px; }

.period-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.pill {
  padding: 6px 14px;
  border-radius: 20px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--t2);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.pill:hover { border-color: var(--accent); color: var(--text); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.custom-range {
  display: none;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.custom-range.show { display: flex; }

.ri {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-family: var(--fh);
  font-size: 13px;
  outline: none;
  transition: border-color .15s;
}
.ri:focus { border-color: var(--accent); }

.toolbar-bottom { display: flex; align-items: center; gap: 10px; justify-content: space-between; flex-wrap: wrap; }
.period-label { font-size: 12px; color: var(--t2); font-family: var(--fm); }

/* BUTTONS */
.btn { border: none; border-radius: 8px; cursor: pointer; font-family: var(--fh); font-weight: 600; letter-spacing: 1px; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
.bsm { font-size: 11px; padding: 7px 14px; }
.bmd { font-size: 13px; padding: 10px 20px; }
.bp { background: var(--accent); color: #fff; }
.bp:hover { background: var(--a2); }
.bgh { background: transparent; color: var(--t2); border: 1px solid var(--border); }
.bgh:hover { background: var(--bg3); color: var(--text); }
.btn:disabled { opacity: .5; cursor: not-allowed; }

/* STAT CARDS */
.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.stat-val { font-size: 24px; font-weight: 700; font-family: var(--fm); color: var(--text); }
.stat-val.green { color: var(--green); }
.stat-lbl { font-size: 11px; color: var(--t3); margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; }

/* TABLE */
.table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.table-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.table-title { font-size: 13px; font-weight: 700; color: var(--text); }

table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--bg3);
  color: var(--t3);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: left;
  position: sticky;
  top: 0;
}
tbody td { padding: 9px 14px; border-bottom: 1px solid rgba(51,65,85,0.4); font-size: 12px; color: var(--text); }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(59,130,246,0.04); }
.fm-cell { font-family: var(--fm); font-size: 11px; color: var(--t2); }
.subtotal td { background: rgba(59,130,246,0.06); font-weight: 700; color: var(--accent); border-top: 1px solid rgba(59,130,246,0.2); }
.grandtotal td { background: rgba(34,197,94,0.08); font-weight: 700; color: var(--green); border-top: 2px solid rgba(34,197,94,0.3); font-size: 13px; }
.empty td { text-align: center; color: var(--t3); padding: 50px; font-size: 13px; }

/* LOGOUT */
.btn-icon { width: 32px; height: 32px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; color: var(--t2); }
.btn-icon:hover { border-color: var(--red, #ef4444); color: var(--red, #ef4444); }
.btn-icon svg { width: 15px; height: 15px; }

/* SPINNER */
.spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TOAST */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-size: 13px; font-weight: 600; transition: transform .25s; z-index: 200; white-space: nowrap; }
#toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  #main { padding: 14px 12px; }
  .stat-row { grid-template-columns: 1fr 1fr; }
  tbody td { padding: 7px 10px; font-size: 11px; }
  thead th { padding: 8px 10px; }
}
</style>
</head>
<body>

<div id="topbar">
  <div>
    <div class="logo">Work<span>Prep</span></div>
    <div class="logo-sub">RAPPORTERING</div>
  </div>
  <div class="topbar-right">
    <div class="user-chip">
      <div>
        <div id="user-name">—</div>
        <div class="user-sub" id="customer-name">—</div>
      </div>
    </div>
    <div class="btn-icon" onclick="doLogout()" title="Uitloggen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </div>
  </div>
</div>

<div id="main">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-title">Periode</div>

    <div class="period-pills">
      <div class="pill" onclick="setPeriod('today')">Vandaag</div>
      <div class="pill" onclick="setPeriod('week')">Deze week</div>
      <div class="pill active" onclick="setPeriod('month')">Deze maand</div>
      <div class="pill" onclick="setPeriod('lastmonth')">Vorige maand</div>
      <div class="pill" onclick="setPeriod('custom')">Aangepast...</div>
    </div>

    <div class="custom-range" id="custom-range">
      <label style="font-size:11px;color:var(--t3);">Van</label>
      <input type="date" class="ri" id="r-from">
      <label style="font-size:11px;color:var(--t3);">Tot</label>
      <input type="date" class="ri" id="r-to">
    </div>

    <div class="toolbar-bottom">
      <div class="period-label" id="period-label">—</div>
      <div style="display:flex;gap:8px;">
        <button class="btn bgh bsm" id="export-btn" onclick="exportExcel()" disabled>
          ↓ Exporteer Excel
        </button>
        <button class="btn bp bmd" onclick="loadReport()">
          Genereer rapport
        </button>
      </div>
    </div>
  </div>

  <!-- STAT CARDS -->
  <div class="stat-row" id="stat-row" style="display:none;">
    <div class="stat-card">
      <div class="stat-val" id="s-jobs">—</div>
      <div class="stat-lbl">Jobs</div>
    </div>
    <div class="stat-card">
      <div class="stat-val green" id="s-hours">—</div>
      <div class="stat-lbl">Totale werktijd</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-techs">—</div>
      <div class="stat-lbl">Techniekers</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="s-avg">—</div>
      <div class="stat-lbl">Gemiddeld per job</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-header">
      <div class="table-title" id="table-title">Rapport</div>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Datum</th>
            <th>Technieker</th>
            <th>Workorder</th>
            <th>Merk</th>
            <th>Model</th>
            <th>Variant</th>
            <th>Chassisnr.</th>
            <th>Nummerplaat</th>
            <th>Werktijd</th>
          </tr>
        </thead>
        <tbody id="report-body">
          <tr class="empty"><td colspan="9">Selecteer een periode en klik op "Genereer rapport"</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ================================================
// SUPABASE
// ================================================
const SUPABASE_URL = 'https://tiavzsywbiwajvxknqof.supabase.co';
const SUPABASE_KEY = 'sb_publishable_aunpvg532iEoEbvOJ08-DA_XOR1rQU4';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ================================================
// STATE
// ================================================
const S = {
  user: null,
  customerId: null,
  currentPeriod: 'month',
  reportData: [],
};

// ================================================
// INIT
// ================================================
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'workprep-login.html'; return; }

  const { data: userData } = await sb.from('users')
    .select('id, full_name, organization_id')
    .eq('id', session.user.id)
    .single();
  if (!userData) { window.location.href = 'workprep-login.html'; return; }

  S.user = userData;
  document.getElementById('user-name').textContent = userData.full_name;

  // Get customer link via user_roles
  const { data: roleData } = await sb.from('user_roles')
    .select('customer_id, customers(name)')
    .eq('user_id', session.user.id)
    .eq('role', 'customer_accountant')
    .maybeSingle();

  if (roleData?.customer_id) {
    S.customerId = roleData.customer_id;
    document.getElementById('customer-name').textContent = roleData.customers?.name || '—';
  } else {
    // Fallback for superuser testing: first customer
    const { data: c } = await sb.from('customers').select('id, name').limit(1).single();
    S.customerId = c?.id;
    document.getElementById('customer-name').textContent = c?.name || '—';
  }

  setPeriod('month');
}

// ================================================
// PERIOD SELECTION
// ================================================
function setPeriod(period) {
  S.currentPeriod = period;

  // Update pills
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  event?.target?.classList.add('active');

  const today = new Date();
  let from, to;

  if (period === 'today') {
    from = to = fmtDate(today);
    document.getElementById('custom-range').classList.remove('show');
  } else if (period === 'week') {
    const day = today.getDay() || 7;
    const mon = new Date(today); mon.setDate(today.getDate() - day + 1);
    from = fmtDate(mon); to = fmtDate(today);
    document.getElementById('custom-range').classList.remove('show');
  } else if (period === 'month') {
    from = fmtDate(new Date(today.getFullYear(), today.getMonth(), 1));
    to   = fmtDate(today);
    document.getElementById('custom-range').classList.remove('show');
  } else if (period === 'lastmonth') {
    const lm = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    from = fmtDate(lm);
    to   = fmtDate(new Date(today.getFullYear(), today.getMonth(), 0));
    document.getElementById('custom-range').classList.remove('show');
  } else if (period === 'custom') {
    document.getElementById('custom-range').classList.add('show');
    from = document.getElementById('r-from').value;
    to   = document.getElementById('r-to').value;
  }

  if (period !== 'custom') {
    document.getElementById('r-from').value = from;
    document.getElementById('r-to').value   = to;
  }

  updatePeriodLabel();
}

function updatePeriodLabel() {
  const from = document.getElementById('r-from').value;
  const to   = document.getElementById('r-to').value;
  if (!from || !to) return;
  const fmtOpts = { day: 'numeric', month: 'long', year: 'numeric' };
  const f = new Date(from).toLocaleDateString('nl-BE', fmtOpts);
  const t = new Date(to).toLocaleDateString('nl-BE', fmtOpts);
  document.getElementById('period-label').textContent = from === to ? f : `${f} — ${t}`;
}

// ================================================
// LOAD REPORT
// ================================================
async function loadReport() {
  const from = document.getElementById('r-from').value;
  const to   = document.getElementById('r-to').value;
  if (!from || !to) { toast('Selecteer een periode'); return; }
  if (!S.customerId) { toast('Geen klant gekoppeld'); return; }

  updatePeriodLabel();
  const tbody = document.getElementById('report-body');
  tbody.innerHTML = `<tr class="empty"><td colspan="9"><div class="spinner" style="margin:0 auto;border-top-color:var(--accent);border-color:rgba(59,130,246,.2);"></div></td></tr>`;
  document.getElementById('export-btn').disabled = true;
  document.getElementById('stat-row').style.display = 'none';

  // Work days in period for this customer
  const { data: wds } = await sb.from('work_days')
    .select('id, user_id, date, users(id, full_name)')
    .eq('customer_id', S.customerId)
    .gte('date', from)
    .lte('date', to)
    .order('date');

  if (!wds?.length) {
    tbody.innerHTML = `<tr class="empty"><td colspan="9">Geen data voor deze periode</td></tr>`;
    return;
  }

  const wdIds = wds.map(w => w.id);
  const wdMap = Object.fromEntries(wds.map(w => [w.id, w]));

  // Jobs
  const { data: jobs } = await sb.from('jobs')
    .select('id, work_day_id, work_order, vin, license_plate, status, brands(name), models(name), variants(name)')
    .in('work_day_id', wdIds)
    .neq('status', 'rejected');

  if (!jobs?.length) {
    tbody.innerHTML = `<tr class="empty"><td colspan="9">Geen jobs gevonden</td></tr>`;
    return;
  }

  // Work sessions (only 'work' type with ended_at)
  const jobIds = jobs.map(j => j.id);
  const { data: sessions } = await sb.from('work_sessions')
    .select('job_id, duration_min')
    .in('job_id', jobIds)
    .eq('session_type', 'work')
    .not('ended_at', 'is', null);

  const durMap = {};
  (sessions || []).forEach(s => {
    durMap[s.job_id] = (durMap[s.job_id] || 0) + (s.duration_min || 0);
  });

  // Build rows
  S.reportData = jobs.map(j => {
    const wd = wdMap[j.work_day_id];
    return {
      date:     wd?.date || '',
      tech:     wd?.users?.full_name || '—',
      tech_id:  wd?.user_id,
      wo:       j.work_order || '—',
      brand:    j.brands?.name || '—',
      model:    j.models?.name || '—',
      variant:  j.variants?.name || '—',
      vin:      j.vin || '—',
      plate:    j.license_plate || '—',
      duration: durMap[j.id] || 0,
    };
  }).sort((a, b) => a.tech.localeCompare(b.tech) || a.date.localeCompare(b.date));

  renderTable();
  renderStats();
  document.getElementById('export-btn').disabled = false;
  document.getElementById('stat-row').style.display = 'grid';
  document.getElementById('table-title').textContent =
    `Rapport — ${S.reportData.length} job${S.reportData.length !== 1 ? 's' : ''}`;
}

function renderTable() {
  const byTech = {};
  S.reportData.forEach(r => {
    if (!byTech[r.tech]) byTech[r.tech] = [];
    byTech[r.tech].push(r);
  });

  let html = '';
  let grandTotal = 0;

  Object.entries(byTech).forEach(([tech, rows]) => {
    const sub = rows.reduce((s, r) => s + r.duration, 0);
    grandTotal += sub;

    rows.forEach(r => {
      html += `<tr>
        <td class="fm-cell">${r.date}</td>
        <td style="font-weight:600;">${escHtml(r.tech)}</td>
        <td class="fm-cell" style="color:var(--accent);">${escHtml(r.wo)}</td>
        <td>${escHtml(r.brand)}</td>
        <td>${escHtml(r.model)}</td>
        <td style="color:var(--t2);font-size:11px;">${escHtml(r.variant)}</td>
        <td class="fm-cell">${escHtml(r.vin)}</td>
        <td class="fm-cell">${escHtml(r.plate)}</td>
        <td class="fm-cell" style="color:var(--green);font-weight:600;">${fmtDur(r.duration)}</td>
      </tr>`;
    });

    html += `<tr class="subtotal">
      <td colspan="8" style="text-align:right;padding-right:20px;">Subtotaal ${escHtml(tech)}</td>
      <td>${fmtDur(sub)}</td>
    </tr>`;
  });

  html += `<tr class="grandtotal">
    <td colspan="8" style="text-align:right;padding-right:20px;">Eindtotaal</td>
    <td>${fmtDur(grandTotal)}</td>
  </tr>`;

  document.getElementById('report-body').innerHTML = html;
}

function renderStats() {
  const total    = S.reportData.reduce((s, r) => s + r.duration, 0);
  const techs    = new Set(S.reportData.map(r => r.tech)).size;
  const jobs     = S.reportData.length;
  const avg      = jobs ? Math.round(total / jobs) : 0;

  document.getElementById('s-jobs').textContent  = jobs;
  document.getElementById('s-hours').textContent = fmtDur(total);
  document.getElementById('s-techs').textContent = techs;
  document.getElementById('s-avg').textContent   = fmtDur(avg);
}

// ================================================
// EXCEL EXPORT
// ================================================
function exportExcel() {
  if (!S.reportData.length) return;

  const from = document.getElementById('r-from').value.replace(/-/g, '');
  const to   = document.getElementById('r-to').value.replace(/-/g, '');

  const rows = [
    ['Datum', 'Technieker', 'Workorder', 'Merk', 'Model', 'Variant', 'Chassisnummer', 'Nummerplaat', 'Werktijd (min)', 'Werktijd'],
  ];

  const byTech = {};
  S.reportData.forEach(r => {
    rows.push([r.date, r.tech, r.wo, r.brand, r.model, r.variant, r.vin, r.plate, r.duration, fmtDur(r.duration)]);
    if (!byTech[r.tech]) byTech[r.tech] = 0;
    byTech[r.tech] += r.duration;
  });

  // Subtotals
  Object.entries(byTech).forEach(([tech, dur]) => {
    rows.push(['', `Subtotaal ${tech}`, '', '', '', '', '', '', dur, fmtDur(dur)]);
  });

  const grandTotal = S.reportData.reduce((s, r) => s + r.duration, 0);
  rows.push(['', 'EINDTOTAAL', '', '', '', '', '', '', grandTotal, fmtDur(grandTotal)]);

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [10, 20, 16, 12, 16, 16, 20, 14, 14, 10].map(w => ({ wch: w }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Rapport');
  XLSX.writeFile(wb, `workprep_rapport_${from}_${to}.xlsx`);
  toast('Excel geëxporteerd ✓');
}

// ================================================
// HELPERS
// ================================================
function fmtDate(d) {
  return d.toISOString().split('T')[0];
}

function fmtDur(min) {
  if (!min) return '0u00';
  return `${Math.floor(min / 60)}u${String(min % 60).padStart(2, '0')}`;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

async function doLogout() {
  await sb.auth.signOut();
  window.location.href = 'workprep-login.html';
}

// ================================================
// BOOT
// ================================================
init();
</script>
</body>
</html>
